name: open_authenticator
description: A cross-platform OTP app, free and open-source.
publish_to: none
version: 2.0.2+27
homepage: https://openauthenticator.app
repository: https://github.com/openauthenticator-app/openauthenticator
license: CC-BY-SA-4.0
issue_tracker: https://github.com/openauthenticator-app/openauthenticator/issues
funding:
  - https://ko-fi.com/Skyost
  - https://paypal.me/Skyost

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  animations: ^2.2.0
  flutter_riverpod: ^3.3.1
  simple_secure_storage: ^0.4.1
  jovial_svg: ^1.1.29
  mobile_scanner: ^7.2.0
  html: ^0.15.6
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  equatable: ^2.0.8
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  path: ^1.9.1
  local_auth: ^3.0.1
  package_info_plus: ^9.0.1
  http: ^1.6.0
  qr_flutter: ^4.1.0
  intl: any
  url_launcher: ^6.3.2
  purchases_flutter: ^10.0.1
  purchases_ui_flutter: ^10.0.1
  purchases_dart:
    git:
      url: https://github.com/openauthenticator-app/purchases-dart.git
  window_manager: ^0.5.1
  slang: ^4.14.0
  slang_flutter: ^4.14.0
  rate_my_app: ^2.3.2
  app_links: ^7.0.0
  hashlib: ^2.3.4
  hashlib_codecs: ^3.1.2
  cipherlib: ^0.4.0
  scrollable_positioned_list: ^0.3.8
  share_plus: ^12.0.2
  wakelock_plus: ^1.5.1
  file_picker: ^11.0.2
  connectivity_plus: ^7.1.1
  sentry_flutter: ^9.19.0
  forui: ^0.21.3
  forui_assets: ^0.21.0
  custom_refresh_indicator: ^4.0.1
  xdg_desktop_portal: ^0.1.14
  # TODO: Remove Firebase dependencies once migration is finished.
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_lints: ^6.0.0
  build_runner: ^2.14.1
  drift_dev: ^2.31.0
  msix: ^3.16.13
  riverpod_lint: ^3.1.3
  release: ^0.1.6
  args: ^2.7.0

flutter:
  assets:
    - assets/images/
    - assets/images/authentication/
    - assets/images/intro/

msix_config:
  display_name: Open Authenticator
  publisher_display_name: Skyost
  identity_name: 32411Skyost.OpenAuthenticator
  publisher: CN=13F97469-F5E7-4417-A3EC-E47287736FE3
  store: true
  logo_path: windows/msix.png
  languages: en, fr, de, pt, it
  trim_logo: false
  capabilities: internetClientServer
  protocol_activation: rc-653ef11675,otpauth,openauthenticator

release:
  changelog:
    header: '# 📰 Open Authenticator changelog'
    defaultIgnoredScopes: ['docs', 'version', 'deps', 'flatpak']
